name = "common-communication"
main = "worker.js"
compatibility_date = "2025-05-01"

[vars]
FIREBASE_DB_URL = "https://motherofdashboard-default-rtdb.asia-southeast1.firebasedatabase.app"
ALLOWED_ORIGIN = "*"
# v1.239: shared Ferra-Periskope gateway. All outbound WhatsApp sends + edits +
# deletes + reactions go through here instead of calling Periskope directly.
# Centralizes the Periskope API key + rate-limit + dedup across all Aroleap
# dashboards. Public URL — not a secret — so it lives in [vars]. Override
# locally with `wrangler secret put PERISKOPE_GATEWAY_URL` if needed.
PERISKOPE_GATEWAY_URL = "https://ferra-periskope-gateway.rohitpatel-mailid297.workers.dev"

[ai]
binding = "AI"

# v1.176: R2 bucket for internal-DM attachments. Firebase Storage requires
# the Blaze plan, so we keep that off and store DM media in R2 instead
# (10 GB free forever, no egress fees). The bucket must exist on the CF
# dashboard before deploy. Create with:
#   wrangler r2 bucket create commoncomm-dm-media
[[r2_buckets]]
binding = "DM_MEDIA"
bucket_name = "commoncomm-dm-media"

# v1.182: the daily cron was removed because the CF account is at the
# 5-cron limit across all Workers (Route Tracker, CTracker, MyWhatsapp,
# etc.). Cleanup now runs via an HTTP endpoint (POST /cleanup-dm-media)
# that anyone can hit periodically — bookmark + click weekly, or wire
# it to a free uptime monitor (cron-job.org) for full automation.
# The scheduled() handler in worker.js stays in place so re-attaching
# a cron in the future is a one-liner if a slot frees up.
# [triggers]
# crons = ["0 3 * * *"]

# Secrets to set via:
#   wrangler secret put PERISKOPE_API_KEY
#   wrangler secret put PERISKOPE_PHONE
#   wrangler secret put FIREBASE_DB_SECRET
#   wrangler secret put CLAUDE_API_KEY      (for /summarize, /suggest-reply)
#   wrangler secret put EXPO_ACCESS_TOKEN   (optional, raises mobile push rate limits)
#   wrangler secret put GROQ_API_KEY        (v1.226+, for /sa-upload server-side
#                                            transcription. Get from console.groq.com)
