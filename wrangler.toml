name = "common-communication"
main = "worker.js"
compatibility_date = "2025-05-01"

[vars]
FIREBASE_DB_URL = "https://motherofdashboard-default-rtdb.asia-southeast1.firebasedatabase.app"
ALLOWED_ORIGIN = "*"

[ai]
binding = "AI"

# v1.176: R2 bucket for internal-DM attachments. Firebase Storage requires
# the Blaze plan, so we keep that off and store DM media in R2 instead
# (10 GB free forever, no egress fees). The bucket must exist on the CF
# dashboard before deploy. Create with:
#   wrangler r2 bucket create commoncomm-dm-media
[[r2_buckets]]
binding = "DM_MEDIA"
bucket_name = "commoncomm-dm-media"

# Secrets to set via:
#   wrangler secret put PERISKOPE_API_KEY
#   wrangler secret put PERISKOPE_PHONE
#   wrangler secret put FIREBASE_DB_SECRET
#   wrangler secret put CLAUDE_API_KEY      (for /summarize, /suggest-reply)
#   wrangler secret put EXPO_ACCESS_TOKEN   (optional, raises mobile push rate limits)
