name = "common-communication"
main = "worker.js"
compatibility_date = "2025-05-01"

[vars]
FIREBASE_DB_URL = "https://motherofdashboard-default-rtdb.asia-southeast1.firebasedatabase.app"
ALLOWED_ORIGIN = "*"

[ai]
binding = "AI"

# v1.239: shared Ferra-Periskope gateway. All outbound WhatsApp sends + edits +
# deletes + reactions go through here instead of calling Periskope directly.
# Uses a SERVICE BINDING (not a public-URL fetch) because Cloudflare's edge
# rejects worker-to-worker calls via *.workers.dev with error 1042. Service
# bindings route internally, are free, and are also faster (no edge hop).
# The target worker is `ferra-periskope-gateway` in the same Cloudflare
# account. Both must be deployed independently — service bindings are
# resolved at deploy time on the caller's side only.
[[services]]
binding = "PERISKOPE_GATEWAY"
service = "ferra-periskope-gateway"

# v1.261: self-service binding so the meeting-transcribe chain can call
# /meeting-transcribe-next from inside another invocation. Public-URL
# fetches between workers on *.workers.dev hit Cloudflare's error 1042
# block (same lesson from the v1.239 gateway migration). Service
# binding to self routes internally — free, fast, no 1042.
[[services]]
binding = "SELF"
service = "common-communication"

# v1.276: shared AI gateway. All Claude calls route through
# ferra-ai-gateway for per-dashboard cost attribution, one-key rotation,
# and rate limiting — same consolidation pattern as PERISKOPE_GATEWAY.
# Service binding for the same 1042 reason as above. Auth is the
# AI_GATEWAY_KEY secret (gk_cc_... key, x-gateway-key header).
[[services]]
binding = "AI_GATEWAY"
service = "ferra-ai-gateway"

# v1.176: R2 bucket for internal-DM attachments. Firebase Storage requires
# the Blaze plan, so we keep that off and store DM media in R2 instead
# (10 GB free forever, no egress fees). The bucket must exist on the CF
# dashboard before deploy. Create with:
#   wrangler r2 bucket create commoncomm-dm-media
[[r2_buckets]]
binding = "DM_MEDIA"
bucket_name = "commoncomm-dm-media"

# v1.182: the daily cron was removed because the CF account is at the
# 5-cron limit across all Workers (Route Tracker, CTracker, MyWhatsapp,
# etc.). Cleanup now runs via an HTTP endpoint (POST /cleanup-dm-media)
# that anyone can hit periodically — bookmark + click weekly, or wire
# it to a free uptime monitor (cron-job.org) for full automation.
# The scheduled() handler in worker.js stays in place so re-attaching
# a cron in the future is a one-liner if a slot frees up.
# [triggers]
# crons = ["0 3 * * *"]

# Secrets to set via:
#   wrangler secret put PERISKOPE_API_KEY
#   wrangler secret put PERISKOPE_PHONE
#   wrangler secret put FIREBASE_DB_SECRET
#   wrangler secret put CLAUDE_API_KEY      (for /summarize, /suggest-reply)
#   wrangler secret put EXPO_ACCESS_TOKEN   (optional, raises mobile push rate limits)
#   wrangler secret put ADMIN_API_KEY       (v1.273, gates /admin/* endpoints)
#   wrangler secret put AI_GATEWAY_KEY       (v1.276, gk_cc_... for ferra-ai-gateway)
#   v1.280 Exotel click-to-call (all five required, else /exotel-call -> 503):
#   wrangler secret put EXOTEL_API_KEY
#   wrangler secret put EXOTEL_API_TOKEN
#   wrangler secret put EXOTEL_SID
#   wrangler secret put EXOTEL_CALLER_ID     (the Ferra ExoPhone shown to customers)
#   wrangler secret put EXOTEL_API_HOST      (e.g. api.exotel.com or api.in.exotel.com)
#   wrangler secret put GROQ_API_KEY        (v1.226+, for /sa-upload server-side
#                                            transcription. Get from console.groq.com)
